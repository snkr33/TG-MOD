<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TG MOD APK</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <img src="tg-mod-logo.png" alt="TG MOD" class="site-logo">
        <p>Download Latest APKs</p>
    </header>


    <main class="app-container">

        <!-- Free Fire Proxy Card -->

        <div class="app-card">

            <div class="badges">
                <span class="new-badge">NEW</span>
                <span class="mod-badge">MOD</span>
            </div>

            <img
                src="free-fire-proxy.png"
                alt="Free Fire Proxy"
                class="app-logo"
            >

            <h2>Free Fire Proxy</h2>

            <p class="category">Games</p>

            <div class="app-info">
                <span>⚡ 2.0</span>
                <span>📥 88 MB</span>
            </div>

            <button
                class="download-btn"
                onclick="openDownloadPopup1()"
            >
                📥 Download APK
            </button>

        </div>


        <!-- Proxy Server 2 Card -->

        <div class="app-card">

            <div class="badges">
                <span class="new-badge">NEW</span>
                <span class="mod-badge">MOD</span>
            </div>

            <img
                src="proxy-server-2.png"
                alt="Proxy Server 2"
                class="app-logo"
            >

            <h2>Proxy Server 2</h2>

            <p class="category">Games</p>

            <div class="app-info">
                <span>⚡ 1</span>
                <span>📥 66 MB</span>
            </div>

            <button
                class="download-btn"
                onclick="openDownloadPopup2()"
            >
                📥 Download APK
            </button>

        </div>

    </main>


    <!-- Instagram Follow Popup -->

    <div id="downloadPopup" class="popup">

        <div class="popup-box">

            <h2>📷 Follow Us First</h2>

            <p>
                Support us on Instagram before downloading ❤️
            </p>

            <a
                href="https://instagram.com/tgmod.xyz"
                target="_blank"
                class="popup-btn instagram-btn"
            >
                📷 Follow Instagram
            </a>

            <button
                id="continueBtn"
                class="popup-btn continue-btn"
            >
                📥 Continue Download
            </button>

            <button
                class="close-btn"
                onclick="closeDownloadPopup()"
            >
                ✕ Close
            </button>

        </div>

    </div>


    <script src="script.js"></script>

</body>

</html>
